name: Unity — test & build (installable, cross-platform)

# Produces the installable builds the game ships as: Windows, Linux (Steam Deck
# is Linux/Proton), Android (mobile), and WebGL. Runs Unity EditMode/PlayMode
# tests first. Gated on a Unity license so it only runs once configured — add
# these repo Secrets (Settings → Secrets → Actions):
#   UNITY_LICENSE  (contents of your .ulf activation file)
#   UNITY_EMAIL, UNITY_PASSWORD  (your Unity account)
# See https://game.ci/docs for obtaining the license.

on:
  workflow_dispatch:        # manual trigger
  push:
    tags: [ 'v*' ]          # build installers on release tags

jobs:
  tests:
    name: Unity tests (EditMode + PlayMode)
    runs-on: ubuntu-latest
    if: ${{ env.UNITY_LICENSE != '' }}
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }
      - uses: actions/cache@v4
        with:
          path: unity/EliminatedGame/Library
          key: Library-${{ hashFiles('unity/EliminatedGame/Assets/**', 'unity/EliminatedGame/Packages/**') }}
          restore-keys: Library-
      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity/EliminatedGame
          testMode: all
          githubToken: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.targetPlatform }}
    needs: tests
    runs-on: ubuntu-latest
    if: ${{ env.UNITY_LICENSE != '' }}
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64   # PC (primary)
          - StandaloneLinux64     # Linux + Steam Deck (Proton)
          - Android               # mobile
          - WebGL                 # browser demo
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }
      - uses: actions/cache@v4
        with:
          path: unity/EliminatedGame/Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('unity/EliminatedGame/Assets/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity/EliminatedGame
          targetPlatform: ${{ matrix.targetPlatform }}
      - uses: actions/upload-artifact@v4
        with:
          name: Eliminated-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}
