name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sim-tests:
    name: Simulation tests (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore sim/Eliminated.sln

      - name: Build
        run: dotnet build sim/Eliminated.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test sim/Eliminated.sln --configuration Release --no-build --logger "trx;LogFileName=results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore

  # Unity EditMode/PlayMode tests + installable cross-platform builds live in a
  # separate workflow (.github/workflows/unity.yml) that runs once a Unity license
  # secret is configured (GameCI). It builds Windows / Linux (Steam Deck) / Android
  # / WebGL and uploads the installers as artifacts.
